name: rayuela_mobile
description: Rayuela mobile app for citizen-science volunteers. Android + iOS, Flutter.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State & DI
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  # MediaType for typed multipart uploads (transitive via dio, but we
  # import it directly in checkins_remote_source.dart so declare it).
  http_parser: ^4.0.2

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Domain helpers
  collection: ^1.18.0
  intl: ^0.20.2

  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1

  # Utilities
  logger: ^2.4.0

  # Phase 1 — tasks + check-in flow
  geolocator: ^13.0.1
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Map-based location picker (mirrors the web's LocationPicker built on
  # OpenLayers; we use OSM tiles via flutter_map).
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Planned in later phases (added here so pubspec is stable):
  # firebase_core: ^3.6.0
  # firebase_messaging: ^15.1.3
  # google_sign_in: ^6.2.1
  # sqflite: ^2.3.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
